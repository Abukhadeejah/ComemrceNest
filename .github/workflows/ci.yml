name: CI (manual)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why run CI'
        required: false
        default: 'Manual run'

jobs:
  web:
    name: Web build and tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Commercenest/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Commercenest/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Install browsers
        run: npx playwright install --with-deps

      - name: Run tests (starts dev server via Playwright webServer)
        run: npx playwright test --reporter=line


